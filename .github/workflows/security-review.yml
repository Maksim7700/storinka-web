name: Security Review

permissions:
  pull-requests: write
  contents: read

on:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-security-review@v1
        with:
          comment-pr: true
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}